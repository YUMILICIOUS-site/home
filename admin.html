<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Yumilicious</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; }
        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #C0392B; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; }
        input { padding: 10px; width: 100%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #C0392B; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        #admin-content { display: none; padding: 40px; }
        .nav { background: #1A1A1A; padding: 20px; color: white; display: flex; justify-content: space-between; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .product-img-edit { width: 50px; height: 50px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <h2>Yumilicious Admin</h2>
            <input type="password" id="pass-input" placeholder="Enter Password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="nav">
            <strong>Yumilicious Control Panel</strong>
            <button onclick="downloadJSON()" style="background:#25D366">Download updated products.json</button>
        </div>

        <div class="section">
            <h3>Banner Management</h3>
            <div id="banner-preview"></div>
            <label>Banner Image URL:</label>
            <input type="text" id="admin-banner-url">
            <button onclick="updateBanner()">Preview Banner</button>
        </div>

        <div class="section">
            <h3>Price Editor</h3>
            <div id="price-table-container"></div>
        </div>

        <div class="section">
            <h3>Instructions</h3>
            <ol>
                <li>Change prices or banner above.</li>
                <li>Click <strong>"Download updated products.json"</strong>.</li>
                <li>Go to GitHub and upload/replace the file in your repository.</li>
            </ol>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
