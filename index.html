<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumilicious | Fast Food & Pizza</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo-box">
                <img id="rest-logo" src="images/logo.png" alt="Yumilicious">
                <span id="rest-name">Yumilicious</span>
            </div>
            <button class="cart-btn" onclick="toggleCart()">
                🛒 <span id="cart-count">0</span>
                <div id="flame" class="flame">🔥</div>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-inner">
            <h1 id="hero-title">Yumilicious</h1>
            <p id="hero-tagline"></p>
            <div class="hero-info">
                <span>🕒 24 Hours</span> | <span>📍 Gujranwala</span>
            </div>
            <a href="#cat-nav" class="btn-main">View Menu</a>
        </div>
    </section>

    <nav class="cat-nav" id="cat-nav"></nav>

    <main class="main-container">
        <div id="menu-display"></div>
    </main>

    <!-- Side Cart -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <aside class="cart-panel" id="cart-panel">
        <div class="cart-head">
            <h3>My Order</h3>
            <button onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-body" id="cart-list"></div>
        <div class="cart-footer">
            <div class="total-line">
                <span>Total:</span>
                <span id="cart-total">Rs. 0</span>
            </div>
            <button class="btn-order" onclick="openCheckout()">Order on WhatsApp</button>
        </div>
    </aside>

    <div class="modal" id="order-modal">
        <div class="modal-inner">
            <h3>Checkout</h3>
            <input type="text" id="cust-name" placeholder="Full Name">
            <div class="type-box">
                <label><input type="radio" name="order-type" value="Delivery" checked onchange="setAddr(true)"> Delivery</label>
                <label><input type="radio" name="order-type" value="Pickup" onchange="setAddr(false)"> Pickup</label>
            </div>
            <textarea id="cust-addr" placeholder="Your Address"></textarea>
            <div class="modal-btns">
                <button onclick="closeModal()">Back</button>
                <button onclick="checkout()" class="btn-send">Confirm & Send</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
